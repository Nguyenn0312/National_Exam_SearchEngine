services:
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: national_examsdb
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init_db:/docker-entrypoint-initdb.d 
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${DB_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 5 

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    command: >
      redis-server
      --tcp-backlog 65535
      --maxclients 200000
      --io-threads 8
      --io-threads-do-reads yes
      --save ""
      --appendonly no
    # Removed redis_sock volume
    ulimits:
      nofile:
        soft: 250000
        hard: 250000
    deploy:
      resources:
         limits:
           cpus: '6'

  app:
    build: .
    environment:
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=db
      - GOMAXPROCS=0 
    # Removed redis_sock volume
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    deploy:
      replicas: 10

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./src/public:/usr/share/nginx/html:ro
    depends_on:
      - app
    ulimits:
      nofile:
        soft: 200000
        hard: 200000

volumes:
  mysql_data:
