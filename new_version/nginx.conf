worker_processes auto; 
worker_rlimit_nofile 1000000;

events {
    worker_connections 250000;
    multi_accept on;
    use epoll;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # ---------- RESOLVER ----------
    resolver 127.0.0.11 valid=5s;

    # ---------- PERFORMANCE ----------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    reset_timedout_connection on;

    # ---------- LOGGING ----------
    access_log off;
    error_log /var/log/nginx/error.log crit;

    # ---------- UPSTREAM ----------
    upstream backend {
        least_conn;
        server app:8000; 
        # Keep 8000 connections alive to the Go backends to prevent 'hello' churn
        keepalive 8000; 
    }

    # ---------- SERVER ----------
    server {
        # Matches your kernel tuning net.core.somaxconn=65535
        listen 80 reuseport backlog=65535;
        # How long Nginx keeps the connection open for WRK/Browsers
        keepalive_timeout 65;
        keepalive_requests 1000000;

        # ---------- STATIC ----------
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }

        # ---------- API ----------
        location /api/ {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            # Crucial for backend keepalive
            proxy_set_header Connection ""; 
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Increased timeouts to handle peak load spikes
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            # Helps keep the TCP pipe healthy
            proxy_socket_keepalive on;
            proxy_buffering off;
        }
    }
}